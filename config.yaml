name: "S0PCM Reader"
description: "S0PCM reader for Home Assistant"
version: "3.2.1"
slug: "s0pcm_reader"
url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"
arch:
  - aarch64
  - amd64
init: false
startup: application
hassio_api: true
homeassistant_api: true
options:
  device: null
  log_level: info
  mqtt: {}
  advanced:
    recovery_wait: 7
  security:
    tls: false
    tls_check_peer: false
schema:
  device: device(subsystem=tty)
  log_level: list(critical|error|warning|info|debug)?
  mqtt:
    host: str?
    port: port?
    username: str?
    password: password?
    client_id: str?
    base_topic: str?
    protocol: list(5.0|3.1.1|3.1)?
  advanced:
    discovery: bool?
    discovery_prefix: str?
    retain: bool?
    split_topic: bool?
    recovery_wait: int(1,60)?
  security:
    tls: bool?
    tls_port: port?
    tls_ca: str?
    tls_check_peer: bool?
services:
  - mqtt:want
