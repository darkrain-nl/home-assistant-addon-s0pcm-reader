name: Bulk Delete Dependabot Runs

on:
  workflow_dispatch: # This allows you to trigger it manually from the Actions tab

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write # Required permission to delete run logs
      contents: read
    steps:
      - name: Delete Dependabot workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_pattern: "Dependabot Updates" # Matches the exact name from your screenshot
