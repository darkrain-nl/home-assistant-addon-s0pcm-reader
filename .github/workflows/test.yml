name: Tests

on:
  push:
    branches: [main, beta, develop, dev]
  pull_request:
    branches: [main, beta, develop, dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync --frozen --group test

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests with pytest
        run: |
          uv run pytest tests/ -v --tb=short --cov=rootfs/usr/src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  docker-test:
    name: Docker Test Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build test container
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: tests/Dockerfile.test
          tags: s0pcm-reader-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Run tests in container
        run: |
          docker run --rm \
            -v "$(pwd)/tests:/workspace/tests:ro" \
            s0pcm-reader-test

  standalone-test:
    name: Standalone Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Build Standalone Stack
        run: docker compose -f tests/standalone/docker-compose.yml build

      - name: Run Standalone Stack
        run: docker compose -f tests/standalone/docker-compose.yml up -d

      - name: Wait for Verifier
        run: |
          echo "Waiting for verification..."
          # Get container ID reliably
          VERIFIER_ID=$(docker compose -f tests/standalone/docker-compose.yml ps -q verifier)
          
          # Wait for exit code
          EXIT_CODE=$(docker wait $VERIFIER_ID)
          
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Verifier failed with exit code $EXIT_CODE"
            docker compose -f tests/standalone/docker-compose.yml logs
            exit 1
          fi
          echo "Verification passed!"

      - name: Cleanup
        if: always()
        run: docker compose -f tests/standalone/docker-compose.yml down

  validate:
    name: Validate Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check version consistency
        run: |
          CONFIG_VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/' | tr -d '\r')
          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/' | tr -d '\r')

          echo "config.yaml:   $CONFIG_VERSION"
          echo "pyproject.toml: $PYPROJECT_VERSION"

          if [ "$CONFIG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch: config.yaml ($CONFIG_VERSION) != pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "✅ Versions match: $CONFIG_VERSION"

      - name: Check CHANGELOG entry exists
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/' | tr -d '\r')

          # For beta versions, check the base version (strip -bN suffix)
          CHECK_VERSION=$(echo "$VERSION" | sed 's/-b[0-9]*$//')

          if grep -q "## \[$CHECK_VERSION" CHANGELOG.md; then
            echo "✅ CHANGELOG entry found for version $CHECK_VERSION"
          else
            echo "::error::No CHANGELOG entry found for version $CHECK_VERSION"
            exit 1
          fi

  publish:
    name: Publish
    needs: [test, docker-test, standalone-test, validate]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') &&
      !startsWith(github.event.head_commit.message, 'ci: bump beta version')
    permissions:
      contents: write
      packages: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    secrets:
      BETA_SYNC_TOKEN: ${{ secrets.BETA_SYNC_TOKEN }}
