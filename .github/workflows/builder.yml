name: Builder

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build Add-on
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Bump beta version files locally
        if: >
          (github.event.workflow_run.head_branch == 'beta' || github.ref == 'refs/heads/beta')
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "Current version: $VERSION"

          if [[ "$VERSION" =~ ^(.+)-b([0-9]+)$ ]]; then
            BASE="${BASH_REMATCH[1]}"
            BETA_NUM="${BASH_REMATCH[2]}"
            NEW_BETA_NUM=$((BETA_NUM + 1))
            NEW_VERSION="${BASE}-b${NEW_BETA_NUM}"

            echo "Bumping beta locally: $VERSION → $NEW_VERSION"
            sed -i "s/^version: \"${VERSION}\"/version: \"${NEW_VERSION}\"/" config.yaml
            sed -i "s/^version = \"${VERSION}\"/version = \"${NEW_VERSION}\"/" pyproject.toml
            
            # Save new version and base to outputs for the commit step later
            # and to be used in GHCR tagging if needed
            echo "new_version=${NEW_VERSION}" >> $GITHUB_ENV
            echo "did_bump=true" >> $GITHUB_ENV
          else
            echo "Version '$VERSION' has no beta suffix, skipping auto-bump"
            echo "did_bump=false" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: home-assistant/builder@master
        with:
          args: |
            --amd64 \
            --aarch64 \
            --target /data \
            --cosign \
            ${{ (github.event.workflow_run.head_branch == 'beta' || github.ref == 'refs/heads/beta') && '--no-latest' || '' }}

      - name: Commit and push bumped version
        if: env.did_bump == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add config.yaml pyproject.toml
          git commit -m "ci: bump beta version to $new_version"
          git push
