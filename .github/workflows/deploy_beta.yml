name: Sync Beta Release

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["Builder"]
    types: [completed]
    branches: [beta]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-beta-repo:
    name: Sync to Beta Repository
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: beta
          path: main-repo
          persist-credentials: false
          fetch-depth: 0

      - name: Modify configuration files for Beta
        run: |
          cd main-repo
          
          # Modify config.yaml
          sed -i 's/^name: "S0PCM Reader"/name: "S0PCM Reader (Beta)"/' config.yaml
          sed -i 's/^slug: "s0pcm_reader"/slug: "s0pcm_reader_beta"/' config.yaml
          
          # Modify repository.yaml
          sed -i 's/^name: S0PCM-Reader/name: "S0PCM-Reader (Beta)"/' repository.yaml
          sed -i 's|url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"|url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta"|' repository.yaml
          
          # Modify build.yaml
          sed -i 's|org.opencontainers.image.title: "S0PCM Reader"|org.opencontainers.image.title: "S0PCM Reader (Beta)"|' build.yaml
          sed -i 's|org.opencontainers.image.source: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"|org.opencontainers.image.source: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta"|' build.yaml
          sed -i 's|org.opencontainers.image.url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"|org.opencontainers.image.url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta"|' build.yaml
          sed -i 's|org.opencontainers.image.documentation: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader/blob/main/DOCS.md"|org.opencontainers.image.documentation: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta/blob/main/DOCS.md"|' build.yaml
          
          # Modify README.md badge to include pre-releases (points to the stable repo)
          sed -i 's|github/v/release/darkrain-nl/home-assistant-addon-s0pcm-reader?style=flat-square|github/v/release/darkrain-nl/home-assistant-addon-s0pcm-reader?include_prereleases\&style=flat-square|' README.md

      - name: Push to Beta Repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.BETA_SYNC_TOKEN }}
        run: |
          cd main-repo
          
          # Setup git config
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Remove existing remote if any, and commit the changes
          git remote rm origin || true
          git add config.yaml repository.yaml build.yaml README.md
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: Automatic preparation for beta release [skip ci]"
          fi
          
          # Push to the new repository's main branch
          git remote add origin "https://x-access-token:${API_TOKEN_GITHUB}@github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta.git"
          
          # Push forcefully to overwrite the beta repo's main branch with our beta branch
          git push -f origin HEAD:main
