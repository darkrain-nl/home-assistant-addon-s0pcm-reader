name: Publish

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HEAD_BRANCH: ${{ github.ref_name }}

permissions:
  contents: read

jobs:
  check:
    name: Check if Release Needed
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      is_beta: ${{ steps.check.outputs.is_beta }}
    steps:
      - name: Checkout config.yaml
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            config.yaml
          sparse-checkout-cone-mode: false

      - name: Check if version exists as tag
        id: check
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "Detected version: $VERSION"

          # Determine if this is a beta version
          if [[ "$VERSION" =~ -b[0-9]+$ ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
            # Beta versions always proceed — prepare job will auto-bump
            echo "Beta version detected, proceeding with build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
            # Stable versions: only build if tag doesn't already exist
            if git ls-remote --tags origin "v$VERSION" | grep -q .; then
              echo "Tag v$VERSION already exists, skipping build."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "Tag v$VERSION does not exist, proceeding with build."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  prepare:
    name: Prepare App Build
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.check.outputs.should_build == 'true'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      did_bump: ${{ steps.bump.outputs.did_bump }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.BETA_SYNC_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: needs.check.outputs.is_beta == 'true'
        with:
          enable-cache: true

      - name: Bump beta version files locally
        id: bump
        if: needs.check.outputs.is_beta == 'true'
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "Current version: $VERSION"

          if [[ "$VERSION" =~ ^(.+)-b([0-9]+)$ ]]; then
            BASE="${BASH_REMATCH[1]}"
            BETA_NUM="${BASH_REMATCH[2]}"
            NEW_BETA_NUM=$((BETA_NUM + 1))
            NEW_VERSION="${BASE}-b${NEW_BETA_NUM}"

            echo "Bumping beta locally: $VERSION → $NEW_VERSION"
            sed -i "s/^version: \"${VERSION}\"/version: \"${NEW_VERSION}\"/" config.yaml
            sed -i "s/^version = \"${VERSION}\"/version = \"${NEW_VERSION}\"/" pyproject.toml
            
            # Auto-bump the topmost heading in CHANGELOG.md so the release extractor finds the notes!
            # It replaces the very first "## [x.y.z...]" heading with the newly generated NEW_VERSION and today's date
            TODAY=$(date +%Y-%m-%d)
            awk -v new_ver="$NEW_VERSION" -v today="$TODAY" '
              !done && /^## \[[0-9]+\.[0-9]+\.[0-9]+(-b[0-9]+)?\]/ {
                print "## [" new_ver "] - " today
                done=1
                next
              }
              {print}
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
            
            # Update uv.lock to reflect the new version
            uv lock
            
            echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "did_bump=true" >> $GITHUB_OUTPUT
            
            # Since outputs don't easily cross to other steps via env without extra mapping,
            # Let's also export to GITHUB_ENV for this job's later steps
            echo "new_version=${NEW_VERSION}" >> $GITHUB_ENV
            echo "did_bump=true" >> $GITHUB_ENV
          else
            echo "Version '$VERSION' has no beta suffix, skipping auto-bump"
            echo "did_bump=false" >> $GITHUB_OUTPUT
            echo "did_bump=false" >> $GITHUB_ENV
          fi

      - name: Enrich CHANGELOG dependency line
        if: steps.bump.outputs.did_bump == 'true'
        run: |
          # Find the last STABLE tag to scope the commit range (skip beta tags)
          # This captures all Renovate commits across the entire beta cycle
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude "*-b*" HEAD 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous stable tag found, skipping dependency enrichment."
            exit 0
          fi

          echo "Scanning Renovate commits since stable tag: $PREV_TAG"

          # Collect unique "fix(deps)" packages from Renovate commits since last stable tag
          # Format: "fix(deps): update dependency <name> to <version>"
          # git log outputs newest-first, so sort -u keeps the latest version per package
          DEPS=$(git log "$PREV_TAG"..HEAD --author="renovate" --oneline \
            | grep "^[a-f0-9]* fix(deps):" \
            | sed -n 's/.*update dependency \(.*\) to \(.*\)/\1 \2/p' \
            | sort -u -k1,1 \
            | awk '{printf "%s%s %s", sep, $1, $2; sep=", "}')

          if [ -z "$DEPS" ]; then
            echo "No notable dependency updates found, keeping generic line."
            exit 0
          fi

          echo "Notable dependency updates: $DEPS"

          # Replace the dependency line (first occurrence only — the current release entry)
          # Matches both the generic placeholder and an already-enriched line from a previous beta
          sed -i "0,/- \*\*Dependencies\*\*: Dependency updates\( ([^)]*)\)\?\\.\?/s//- **Dependencies**: Dependency updates ($DEPS)./" CHANGELOG.md

      - name: Commit and push bumped version
        if: steps.bump.outputs.did_bump == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add config.yaml pyproject.toml CHANGELOG.md uv.lock
          git commit -m "ci: bump beta version to $new_version"
          git push

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # master
        with:
          architectures: '["amd64", "aarch64"]'
          image-name: addon-s0pcm_reader

  build-arch:
    name: Build ${{ matrix.arch }} image
    needs: [check, prepare]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}

      - name: Get version and build_from
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
          BUILD_FROM=$(grep "^  ${{ matrix.arch }}:" build.yaml | awk '{print $2}' | tr -d '"')
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # master
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            BUILD_FROM=${{ steps.version.outputs.build_from }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ steps.version.outputs.version }}
            ${{ needs.check.outputs.is_beta == 'false' && 'latest' || '' }}
          push: "true"
          version: ${{ steps.version.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [check, prepare, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # master
        with:
          architectures: '["amd64", "aarch64"]'
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: addon-s0pcm_reader
          image-tags: |
            ${{ steps.version.outputs.version }}
            ${{ needs.check.outputs.is_beta == 'false' && 'latest' || '' }}

  build-standalone:
    name: Build Standalone
    needs: [check, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: needs.check.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and Push Standalone
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/darkrain-nl/s0pcm-reader-standalone:${{ steps.version.outputs.version }}
            ghcr.io/darkrain-nl/s0pcm-reader-standalone:${{ needs.check.outputs.is_beta == 'true' && 'beta' || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [check, manifest, build-standalone]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          fetch-tags: true
          fetch-depth: 0

      - name: Read version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Release Notes from CHANGELOG
        if: steps.check_tag.outputs.exists == 'false'
        id: extract_notes
        run: |
          # Extract the section from CHANGELOG.md for the current version
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' > release_notes.md
          
          # Manually generate "What's Changed" to avoid GitHub's flawed detection
          # Beta: Compare against the absolute last tag
          # Stable: Compare against the last STABLE tag (exclude beta tags)
          if [ "${{ needs.check.outputs.is_beta }}" = "true" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          else
            PREV_TAG=$(git describe --tags --abbrev=0 --exclude "*-b*" HEAD^ 2>/dev/null || echo "")
          fi
          
          if [ -n "$PREV_TAG" ]; then
            echo -e "\n## What's Changed" >> release_notes.md
            # List all merged PRs between PREV_TAG and current HEAD, excluding internal release PRs
            git log $PREV_TAG..HEAD --oneline --grep="Merge pull request" --grep="(#.*)" | grep -vE "from darkrain-nl/(dev|beta)" | sed 's/^[a-f0-9]* //;s/^/- /' >> release_notes.md
            
            # If no PRs were found, add a fallback note
            if ! grep -q "^- " release_notes.md; then
              echo "Internal maintenance and direct commits." >> release_notes.md
            fi
            
            echo -e "\n**Full Changelog**: https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader/compare/$PREV_TAG...${{ steps.version.outputs.tag }}" >> release_notes.md
          fi

      - name: Create Stable Release
        if: >
          steps.check_tag.outputs.exists == 'false' &&
          needs.check.outputs.is_beta == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false

      - name: Create Beta Pre-release
        if: >
          steps.check_tag.outputs.exists == 'false' &&
          needs.check.outputs.is_beta == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          name: Pre-release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: true
          make_latest: false

  sync-back-to-dev:
    name: Sync Beta back to Dev
    needs: [prepare, release]
    runs-on: ubuntu-latest
    if: github.ref_name == 'beta' && needs.prepare.outputs.did_bump == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: dev
          token: ${{ secrets.BETA_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Merge beta into dev
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Fetch all branches to ensure origin/beta is available
          git fetch origin beta
          git merge origin/beta --no-ff -m "ci: sync beta back to dev"
          git push origin dev

  sync-to-beta-repo:
    name: Sync to Beta Repository
    needs: [check, manifest, release]
    runs-on: ubuntu-latest
    if: github.ref_name == 'beta' || github.ref_name == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          path: main-repo
          persist-credentials: false
          fetch-depth: 0

      - name: Modify configuration files for Beta
        run: |
          cd main-repo
          
          # Modify config.yaml
          sed -i 's/^name: "S0PCM Reader"/name: "S0PCM Reader (Beta)"/' config.yaml
          sed -i 's/^slug: "s0pcm_reader"/slug: "s0pcm_reader_beta"/' config.yaml
          
          # Modify repository.yaml
          sed -i 's/^name: S0PCM-Reader/name: "S0PCM-Reader (Beta)"/' repository.yaml
          sed -i 's|url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"|url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta"|' repository.yaml
          
          # Modify build.yaml
          sed -i 's|org.opencontainers.image.title: "S0PCM Reader"|org.opencontainers.image.title: "S0PCM Reader (Beta)"|' build.yaml
          sed -i 's|org.opencontainers.image.source: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"|org.opencontainers.image.source: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta"|' build.yaml
          sed -i 's|org.opencontainers.image.url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader"|org.opencontainers.image.url: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta"|' build.yaml
          sed -i 's|org.opencontainers.image.documentation: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader/blob/main/DOCS.md"|org.opencontainers.image.documentation: "https://github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta/blob/main/DOCS.md"|' build.yaml
          
          # Modify README.md badge to include pre-releases
          sed -i 's|github/v/release/darkrain-nl/home-assistant-addon-s0pcm-reader?style=flat-square|github/v/release/darkrain-nl/home-assistant-addon-s0pcm-reader?include_prereleases\&style=flat-square|' README.md

      - name: Push to Beta Repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.BETA_SYNC_TOKEN }}
        run: |
          cd main-repo
          
          # Setup git config
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          git remote rm origin || true
          git add config.yaml repository.yaml build.yaml README.md
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: Automatic preparation for beta release [skip ci]"
          fi
          
          git remote add origin "https://x-access-token:${API_TOKEN_GITHUB}@github.com/darkrain-nl/home-assistant-addon-s0pcm-reader-beta.git"
          git push -f origin HEAD:main
